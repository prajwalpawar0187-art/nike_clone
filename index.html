<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geomini:wght@200..800&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
        integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header>
        <nav>
            <div class="navbar">
                <div class="menu">
                    <span class="menu-icon" id="home">Home</span>
                    <span class="menu-icon">Sign Up</span>
                    <span class="menu-icon">Login</span>
                </div>
            </div>
            <div class="main-menu">
                <div class="logo">
                    <img src="/images/nike_logo.svg" alt="logo" id="logo">
                </div>
                <div class="suggest-menu">
                    <span class="suggest-icon">New & Featured</span>
                    <span class="suggest-icon">Men</span>
                    <span class="suggest-icon">Women</span>
                    <span class="suggest-icon">Kids</span>
                    <span class="suggest-icon">Jordan</span>
                    <span class="suggest-icon">Sale</span>
                </div>
                <div class="search">
                    <div class="search-items">
                        <i class="fa-solid fa-magnifying-glass" id="magnify"></i>
                        <input type="text" placeholder="Search" id="search-ip">
                    </div>
                    <div class="cart">
                        <span id="like"><i class="fa-regular fa-heart"></i></span>
                        <span id="bag"><i class="fa-solid fa-bag-shopping"></i></span>
                    </div>
                </div>
            </div>
            <div class="discount">
                <p>Enjoy 10% Off On The Nike App. Use: APP10</p>
                <p id="download">Download Now T&Cs</p>
            </div>
        </nav>
    </header>

    <main>

        <div class="main-video">
            <video class="vid" src="/video/7959228-uhd_4096_2160_25fps.mp4" autoplay muted loop></video>
            <div id="vid-heading">
                <h1>Dont Play By The Book</h1>
            </div>
        </div>

        <h1 id="features">Featured</h1>
        <div class="feature">
            <div>
                <img class="feature-one" src="/images/first_one.avif" alt="">
                <img class="feature-two" src="/images/first_second.avif" alt="">
            </div>
        </div>
        <div class="trending">
            <p id="trending">Trending</p>

        </div>
        <div class="trend">
            <div class="trend-content">
                <img class="trend-img" src="/images/trend_one.avif" alt="">
                <img src="/images/trend_two.avif" alt="" class="trend-img">
                <img src="/images/trend_three.avif" alt="" class="trend-img">
            </div>
        </div>

        <div class="sports">
            <p id="sport">Shop by Sport</p>
        </div>
        <div id="shop-sport" class="trend">
            <div class="trend-content">
                <div><img src="/images/gym.avif" alt=""></div>
                <img src="/images/sportwear.avif" alt="">
                <img src="/images/training.avif" alt="">
            </div>
        </div>

        <div class="final">
            <img src="/images/final-img.avif" alt="" class="final-img">
        </div>

        <div class="spot">
            <img src="/images/spotlight.avif" alt="" id="spotlight">
        </div>
        <div class="shoes">
            <div class="spot-collection">
                <img src="/images/1.avif" alt="" class="boot">
                <img src="/images/2.avif" alt="" class="boot">
                <img src="/images/3.avif" alt="" class="boot">
                <img src="/images/4.avif" alt="" class="boot">
                <img src="/images/5.avif" alt="" class="boot">
                <img src="/images/6.avif" alt="" class="boot">
                <img src="/images/7.avif" alt="" class="boot">
                <img src="/images/8.avif" alt="" class="boot">
            </div>
        </div>
        <div class="shoes" id="shoe1">
            <div class="spot-collection">
                <img src="/images/11.avif" alt="" class="boot">
                <img src="/images/12.avif" alt="" class="boot">
                <img src="/images/13.avif" alt="" class="boot">
                <img src="/images/14.avif" alt="" class="boot">
                <img src="/images/15.avif" alt="" class="boot">
                <img src="/images/16.avif" alt="" class="boot">
                <img src="/images/17.avif" alt="" class="boot">
                <img src="/images/18.avif" alt="" class="boot">
            </div>
        </div>
    </main>

    <footer>
        <div class="last">
            <div class="policy">
                <span class="cokkies">© 2026 Nike, Inc. All rights reserved</span>
                <span class="cokkies">Terms of Use</span>
                <span class="cokkies">Nike Privacy Policy</span>
                <span class="cokkies">Store Claim Policy</span>
            </div>
        </div>
    </footer>
</body>

</html>
